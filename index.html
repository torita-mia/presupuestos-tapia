<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestos</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #DDD9D0; border-radius: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">



// ── Logo embebido ──────────────────────────────────────────────────────────────
// (se carga desde localStorage si el usuario sube el suyo)
const LOGO_DEFAULT = null; // se setea desde config

// ── helpers numéricos ──────────────────────────────────────────────────────────
const fPeso = n => '$' + Math.round(n).toLocaleString('es-AR');

function numLetras(n) {
  if (!n) return 'cero'; n = Math.round(n);
  const mill = Math.floor(n / 1000000), mil = Math.floor((n % 1000000) / 1000), rest = n % 1000;
  const parts = [];
  if (mill === 1) parts.push('un millón'); else if (mill > 1) parts.push(cientos(mill) + ' millones');
  if (mil > 0) parts.push(cientos(mil) + ' mil');
  if (rest > 0) parts.push(cientos(rest));
  return parts.join(' ');
}
function cientos(n) {
  if (!n) return '';
  const cm = {100:'cien',200:'doscientos',300:'trescientos',400:'cuatrocientos',500:'quinientos',600:'seiscientos',700:'setecientos',800:'ochocientos',900:'novecientos'};
  const c = Math.floor(n/100)*100, r = n%100;
  if (!r) return cm[c]||'';
  if (c===100) return 'ciento '+decenas(r);
  if (!c) return decenas(r);
  return (cm[c]||'') + ' ' + decenas(r);
}
function decenas(n) {
  const u = {0:'',1:'uno',2:'dos',3:'tres',4:'cuatro',5:'cinco',6:'seis',7:'siete',8:'ocho',9:'nueve',10:'diez',11:'once',12:'doce',13:'trece',14:'catorce',15:'quince',16:'dieciséis',17:'diecisiete',18:'dieciocho',19:'diecinueve',20:'veinte',21:'veintiuno',22:'veintidós',23:'veintitrés',24:'veinticuatro',25:'veinticinco',26:'veintiséis',27:'veintisiete',28:'veintiocho',29:'veintinueve',30:'treinta'};
  if (n in u) return u[n];
  const td = {30:'treinta',40:'cuarenta',50:'cincuenta',60:'sesenta',70:'setenta',80:'ochenta',90:'noventa'};
  const t = Math.floor(n/10)*10, uu = n%10;
  return uu ? (td[t]||'') + ' y ' + u[uu] : (td[t]||'');
}

const getAll = () => JSON.parse(localStorage.getItem('pptos') || '[]');
const saveAll = list => localStorage.setItem('pptos', JSON.stringify(list));
const getCfg = () => JSON.parse(localStorage.getItem('cfg') || '{}');

// ── PDF generator (puro JS, sin librerías externas) ────────────────────────────
function downloadPDF(data) {
  const cfg = data.cfg || {};
  const total = data.total || 0;
  const mA = total * (data.pA || 0) / 100;
  const mS = total * (data.pS || 0) / 100;
  const logoSrc = data.logo || cfg.logo || null;

  const p = (txt, extra='') => txt ? `<p style="margin:0 0 6px 0;font-size:10.5pt;line-height:1.65;text-align:justify;${extra}">${txt}</p>` : '';
  const h = txt => `<p style="font-size:10.5pt;font-weight:bold;margin:16px 0 5px 0">${txt}</p>`;
  const bul = items => items.map(i=>`<p style="margin:0 0 4px 0;padding-left:13px;text-indent:-8px;font-size:10.5pt;line-height:1.6;text-align:justify">• ${i}</p>`).join('');

  const plazoTxt = data.plazo_dias
    ? `El plazo estimado de ejecución de los trabajos será de ${data.plazo_dias} días corridos${data.plazo_nota ? ', ' + data.plazo_nota : ''}.` : '';

  const matStr = data.mat_incluye
    ? 'El presente presupuesto <strong>INCLUYE</strong> materiales.'
    : 'El presente presupuesto <strong>NO incluye</strong> materiales.';

  const logoTag = logoSrc
    ? `<img src="${logoSrc}" style="max-width:100px;max-height:88px;object-fit:contain;display:block">`
    : '';

  const sub = (cfg.sub || 'Servicios Integrales de Construcción y Mantenimiento').toUpperCase();

  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Presupuesto — ${data.destinatarios||''}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Times New Roman',Times,serif;font-size:10.5pt;color:#000;background:#fff;padding:22mm 22mm 22mm 22mm}
@page{size:A4;margin:22mm}
@media print{body{padding:0}-webkit-print-color-adjust:exact;print-color-adjust:exact}
</style>
</head><body>
<table style="width:100%;border-collapse:collapse;margin-bottom:4px">
<tr>
  <td style="vertical-align:top">
    <div style="font-size:26pt;font-weight:900;line-height:1;margin-bottom:3px">PRESUPUESTO DE OBRA</div>
    <div style="font-size:8.5pt;font-weight:bold;letter-spacing:.7px;margin-bottom:9px">${sub}</div>
    ${cfg.cel?`<div style="font-size:10pt;margin-bottom:3px">&#9432;&nbsp; Celular: ${cfg.cel}</div>`:''}
    ${cfg.dom?`<div style="font-size:10pt;margin-bottom:3px">&#9679;&nbsp; Domicilio: ${cfg.dom}</div>`:''}
    ${cfg.cuit?`<div style="font-size:10pt;margin-bottom:3px">&#9646;&nbsp; CUIT: ${cfg.cuit}</div>`:''}
    <div style="font-size:10pt">&#9643;&nbsp; Fecha: ${data.fecha}</div>
  </td>
  <td style="vertical-align:top;text-align:right;width:115px">${logoTag}</td>
</tr>
</table>
<hr style="border:none;border-top:1px solid #999;margin:10px 0 12px">
${h('DESTINATARIOS')}
<p style="font-weight:bold;font-size:10.5pt;margin-bottom:6px">${data.destinatarios||''}</p>
${p(data.intro)}
${data.informe ? h('INFORME TÉCNICO Y VISITA PREVIA') + data.informe.split('\n').filter(l=>l.trim()).map(l=>p(l)).join('') : ''}
${data.concepto ? h('CONCEPTO DE TRABAJO') + p(data.concepto) : ''}
${data.tareas&&data.tareas.length ? h('DESCRIPCIÓN TÉCNICA DE LAS TAREAS A REALIZAR') + bul(data.tareas) : ''}
${plazoTxt ? h('PLAZO DE EJECUCIÓN') + p(plazoTxt) + p('La planificación y secuencia de ejecución de las tareas será determinada por el responsable técnico de los trabajos, iniciándose las labores de la forma que se considere más adecuada para garantizar la correcta realización de la obra.') : ''}
${h('MATERIALES')}
${p(matStr)}
${p(data.mat_detalle)}
<table style="width:100%;border:1.5px solid #666;border-collapse:collapse;margin:14px 0">
<tr><td style="padding:13px 15px">
  <p style="font-size:10.5pt;font-weight:bold;margin-bottom:8px">IMPORTE TOTAL</p>
  <div style="display:inline-block;border:1.5px solid #666;padding:5px 14px;margin-bottom:5px">
    <span style="font-size:21pt;font-weight:900">${fPeso(total)}</span>
  </div>
  <p style="font-size:9.5pt;font-style:italic;margin-bottom:11px">(${numLetras(total)} pesos)</p>
  <hr style="border:none;border-top:1px solid #bbb;margin-bottom:10px">
  <p style="font-size:10.5pt;font-weight:bold;margin-bottom:6px">FORMA DE PAGO</p>
  <p style="margin:0 0 4px 13px;text-indent:-8px;font-size:10.5pt">• ${data.conA||'Anticipo al inicio de los trabajos'}: ${data.pA||0}% (${fPeso(mA)})</p>
  <p style="margin:0 0 4px 13px;text-indent:-8px;font-size:10.5pt">• ${data.conS||'Saldo contra finalización de obra'}: ${data.pS||0}% (${fPeso(mS)})</p>
  ${data.obs&&data.obs.length ? `<hr style="border:none;border-top:1px solid #bbb;margin:10px 0"><p style="font-size:10.5pt;font-weight:bold;margin-bottom:6px">OBSERVACIONES</p>${bul(data.obs)}` : ''}
</td></tr>
</table>
<div style="margin-top:28px">
  <p style="font-size:10.5pt;font-weight:bold;margin-bottom:18px">Firma:</p>
  <div style="border-top:1px solid #000;width:190px;margin-bottom:4px"></div>
  <p style="font-size:10pt;font-weight:bold">José Antonio Tapia</p>
  <p style="font-size:9.5pt;color:#555">Servicios Integrales de Construcción y Mantenimiento</p>
</div>
<script>window.onload=()=>setTimeout(()=>window.print(),500);<\/script>
</body></html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `presupuesto_${(data.destinatarios||'cliente').replace(/[^a-zA-Z0-9]/g,'_').substring(0,20)}.html`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── UI primitives ──────────────────────────────────────────────────────────────
const inp = { fontFamily:'inherit', fontSize:13, color:'#1A1816', background:'#F7F6F3', border:'1px solid #DDD9D0', borderRadius:8, padding:'8px 10px', outline:'none', width:'100%' };
const Input = ({ style={}, ...p }) => <input style={{...inp,...style}} {...p} />;
const Textarea = ({ rows=4, style={}, ...p }) => <textarea rows={rows} style={{...inp, resize:'vertical', lineHeight:1.6, ...style}} {...p} />;

function Field({ label, hint, children, style={} }) {
  return <div style={{ display:'flex', flexDirection:'column', gap:5, flex:1, ...style }}>
    {label && <label style={{ fontSize:10.5, fontWeight:600, color:'#7A756C', textTransform:'uppercase', letterSpacing:.5 }}>{label}</label>}
    {children}
    {hint && <span style={{ fontSize:10.5, color:'#7A756C' }}>{hint}</span>}
  </div>;
}

function Card({ num, title, children }) {
  return <div style={{ background:'#fff', border:'1px solid #DDD9D0', borderRadius:12, boxShadow:'0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05)' }}>
    <div style={{ padding:'12px 20px', borderBottom:'1px solid #DDD9D0', display:'flex', alignItems:'center', gap:10, borderRadius:'12px 12px 0 0' }}>
      <div style={{ width:24, height:24, background:'#2B4C3F', color:'#fff', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, flexShrink:0 }}>{num}</div>
      <div style={{ fontSize:13, fontWeight:600 }}>{title}</div>
    </div>
    <div style={{ padding:'16px 20px', display:'flex', flexDirection:'column', gap:13 }}>{children}</div>
  </div>;
}

function DynList({ items, onChange, placeholder }) {
  const add = () => onChange([...items, '']);
  const rm = i => onChange(items.filter((_,j)=>j!==i));
  const upd = (i,v) => onChange(items.map((x,j)=>j===i?v:x));
  return <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
    {items.map((item,i) => <div key={i} style={{ display:'flex', gap:7 }}>
      <Input value={item} onChange={e=>upd(i,e.target.value)} placeholder={placeholder} />
      <button onClick={()=>rm(i)} style={{ width:28, height:28, border:'none', background:'#FBE9E7', color:'#C0392B', borderRadius:5, cursor:'pointer', fontSize:16, flexShrink:0 }}>×</button>
    </div>)}
    <button onClick={add} style={{ padding:'6px 12px', border:'1px dashed #DDD9D0', background:'none', borderRadius:8, fontSize:12, color:'#7A756C', cursor:'pointer', display:'flex', alignItems:'center', gap:5, marginTop:2, fontFamily:'inherit' }}>+ Agregar</button>
  </div>;
}

function Toast({ msg }) {
  if (!msg) return null;
  const isErr = msg.startsWith('❌');
  return <div style={{ position:'fixed', bottom:20, right:20, background: isErr?'#C0392B':'#2B4C3F', color:'#fff', padding:'11px 18px', borderRadius:8, fontSize:13, fontWeight:500, zIndex:9999, maxWidth:360, lineHeight:1.4 }}>{msg}</div>;
}

// ── FORM ───────────────────────────────────────────────────────────────────────
function FormView({ loadData, onSaved }) {
  const [dest, setDest] = useState('');
  const [intro, setIntro] = useState('');
  const [informe, setInforme] = useState('');
  const [concepto, setConcepto] = useState('');
  const [tareas, setTareas] = useState(['']);
  const [plazoDias, setPlazoDias] = useState('');
  const [plazoNota, setPlazoNota] = useState('');
  const [matIncluye, setMatIncluye] = useState(false);
  const [matDetalle, setMatDetalle] = useState('');
  const [importe, setImporte] = useState('');
  const [pctA, setPctA] = useState(50);
  const [pctS, setPctS] = useState(50);
  const [conA, setConA] = useState('Anticipo al inicio de los trabajos');
  const [conS, setConS] = useState('Saldo contra finalización de obra');
  const [obs, setObs] = useState(['']);
  const [editId, setEditId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState('');

  useEffect(() => {
    if (!loadData) return;
    const p = loadData;
    setEditId(p.id); setDest(p.destinatarios||''); setIntro(p.intro||'');
    setInforme(p.informe||''); setConcepto(p.concepto||'');
    setTareas(p.tareas&&p.tareas.length?p.tareas:['']);
    setPlazoDias(p.plazo_dias||''); setPlazoNota(p.plazo_nota||'');
    setMatIncluye(p.mat_incluye||false); setMatDetalle(p.mat_detalle||'');
    setImporte(p.total?String(p.total):'');
    setPctA(p.pA||50); setPctS(p.pS||50);
    setConA(p.conA||'Anticipo al inicio de los trabajos');
    setConS(p.conS||'Saldo contra finalización de obra');
    setObs(p.obs&&p.obs.length?p.obs:['']);
  }, [loadData]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''), 4000); };
  const total = parseFloat(importe)||0, mA = total*pctA/100, mS = total*pctS/100;

  const collect = () => ({
    id: editId || Date.now().toString(),
    fecha: new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}),
    ts: Date.now(), cfg: getCfg(),
    destinatarios: dest, intro, informe, concepto,
    tareas: tareas.filter(t=>t.trim()),
    plazo_dias: plazoDias, plazo_nota: plazoNota,
    mat_incluye: matIncluye, mat_detalle: matDetalle,
    total, pA: pctA, pS: pctS, conA, conS,
    obs: obs.filter(o=>o.trim()),
    logo: getCfg().logo || null
  });

  const handleSave = () => {
    if (!dest.trim()) { showToast('❌ Ingresá al menos el destinatario'); return; }
    setLoading(true);
    setTimeout(() => {
      const data = collect();
      const all = getAll();
      const idx = all.findIndex(p=>p.id===data.id);
      if (idx>=0) all[idx]=data; else all.unshift(data);
      saveAll(all);
      setEditId(data.id);
      try {
        downloadPDF(data);
        showToast('✅ Guardado. Se descargó un archivo .html — abrilo en el navegador y usá Ctrl+P → Guardar como PDF');
      } catch(e) { showToast('❌ Error: '+e.message); }
      setLoading(false);
      onSaved();
    }, 80);
  };

  const lbl = txt => <label style={{ fontSize:10.5, fontWeight:600, color:'#7A756C', textTransform:'uppercase', letterSpacing:.5 }}>{txt}</label>;
  const tog = on => ({ flex:1, padding:'9px 8px', border: on?'2px solid #2B4C3F':'2px solid #DDD9D0', borderRadius:8, textAlign:'center', cursor:'pointer', fontSize:12.5, fontWeight:500, color: on?'#2B4C3F':'#7A756C', background: on?'#E8F0ED':'transparent', transition:'all .15s' });
  const MontoBox = ({ val }) => <div style={{ padding:'8px 10px', background:'#E8F0ED', border:'1px solid #C5DDD5', borderRadius:8, fontSize:13, fontWeight:700, color:'#2B4C3F', whiteSpace:'nowrap', height:36, display:'flex', alignItems:'center' }}>{fPeso(val)}</div>;

  return <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
    <div style={{ background:'#fff', borderBottom:'1px solid #DDD9D0', padding:'12px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
      <div style={{ fontSize:17, fontWeight:700 }}>{editId ? 'Editando presupuesto' : 'Nuevo presupuesto'}</div>
      <button onClick={handleSave} disabled={loading} style={{ padding:'9px 18px', background: loading?'#7A9E95':'#2B4C3F', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor: loading?'default':'pointer', display:'flex', alignItems:'center', gap:7, fontFamily:'inherit' }}>
        {loading ? '\u23F3 Generando...' : '\u2B07\uFE0F Guardar y generar PDF'}
      </button>
    </div>
    <div style={{ overflowY:'auto', padding:'20px 22px', display:'flex', flexDirection:'column', gap:16 }}>
      <Card num="1" title="Destinatarios">
        <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
          {lbl('Empresa / Persona / Consorcio')}
          <Input value={dest} onChange={e=>setDest(e.target.value)} placeholder="MARO FRAMA S.A. / COSMETICOS ANGOSTURA SA" />
          <span style={{ fontSize:10.5, color:'#7A756C' }}>Podes poner varios separados por /</span>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
          {lbl('Texto de presentacion')}
          <Textarea value={intro} onChange={e=>setIntro(e.target.value)} placeholder="Por la presente me dirijo a los responsables de la empresa/consorcio..." />
        </div>
      </Card>
      <Card num="2" title="Informe tecnico y visita previa">
        <Textarea rows={5} value={informe} onChange={e=>setInforme(e.target.value)} placeholder="Describi la visita tecnica realizada..." />
      </Card>
      <Card num="3" title="Concepto de trabajo">
        <Textarea rows={3} value={concepto} onChange={e=>setConcepto(e.target.value)} placeholder="Ejecucion de trabajos de..." />
      </Card>
      <Card num="4" title="Descripcion tecnica de las tareas">
        <DynList items={tareas} onChange={setTareas} placeholder="Describi la tarea..." />
      </Card>
      <Card num="5" title="Plazo de ejecucion">
        <div style={{ display:'grid', gridTemplateColumns:'140px 1fr', gap:13 }}>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Dias corridos')}
            <Input type="number" value={plazoDias} onChange={e=>setPlazoDias(e.target.value)} placeholder="20" />
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Aclaracion')}
            <Input value={plazoNota} onChange={e=>setPlazoNota(e.target.value)} placeholder="pudiendo extenderse por razones climaticas..." />
          </div>
        </div>
      </Card>
      <Card num="6" title="Materiales">
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          <div style={tog(!matIncluye)} onClick={()=>setMatIncluye(false)}>No incluye materiales</div>
          <div style={tog(matIncluye)} onClick={()=>setMatIncluye(true)}>Incluye materiales</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:5, opacity: matIncluye ? 1 : 0.35, pointerEvents: matIncluye ? 'auto' : 'none', transition:'opacity .2s' }}>
          {lbl('Detalle adicional')}
          <Textarea rows={2} value={matDetalle} onChange={e=>setMatDetalle(e.target.value)} placeholder="Los materiales seran provistos por la propiedad..." disabled={!matIncluye} />
        </div>
      </Card>
      <Card num="7" title="Importe y forma de pago">
        <div style={{ display:'flex', flexDirection:'column', gap:5, maxWidth:260 }}>
          {lbl('Importe total ($)')}
          <Input type="number" value={importe} onChange={e=>setImporte(e.target.value)} placeholder="7900000" />
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'110px 1fr 120px', gap:13, alignItems:'end' }}>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Anticipo (%)')}
            <Input type="number" value={pctA} onChange={e=>setPctA(Number(e.target.value))} />
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Concepto')}
            <Input value={conA} onChange={e=>setConA(e.target.value)} />
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Monto')}
            <MontoBox val={mA} />
          </div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'110px 1fr 120px', gap:13, alignItems:'end' }}>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Saldo (%)')}
            <Input type="number" value={pctS} onChange={e=>setPctS(Number(e.target.value))} />
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Concepto')}
            <Input value={conS} onChange={e=>setConS(e.target.value)} />
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {lbl('Monto')}
            <MontoBox val={mS} />
          </div>
        </div>
      </Card>
      <Card num="8" title="Observaciones">
        <DynList items={obs} onChange={setObs} placeholder="Escribi una observacion..." />
      </Card>
      <div style={{ height:40 }} />
    </div>
    <Toast msg={toast} />
  </div>;
}

// ── HISTORY ────────────────────────────────────────────────────────────────────
function HistoryView({ onLoad }) {
  const [list, setList] = useState(getAll());
  const del = id => { if(!confirm('¿Eliminás este presupuesto?')) return; saveAll(getAll().filter(p=>p.id!==id)); setList(getAll()); };

  if (!list.length) return <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', flex:1, color:'#7A756C', gap:10 }}>
    <div style={{ fontSize:40 }}>📋</div>
    <div style={{ fontSize:15, fontWeight:600, color:'#1A1816' }}>Todavía no hay presupuestos</div>
    <div style={{ fontSize:13 }}>Completá el formulario y guardá el primero.</div>
  </div>;

  return <div style={{ padding:24 }}>
    <div style={{ fontSize:22, fontWeight:700, marginBottom:18 }}>Historial</div>
    <div style={{ background:'#fff', border:'1px solid #DDD9D0', borderRadius:12, overflow:'hidden' }}>
      <table style={{ width:'100%', borderCollapse:'collapse' }}>
        <thead><tr style={{ background:'#F0EEE9', borderBottom:'1px solid #DDD9D0' }}>
          {['Cliente','Fecha','Importe','Acciones'].map(h=><th key={h} style={{ textAlign:'left', padding:'10px 16px', fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:.5, color:'#7A756C' }}>{h}</th>)}
        </tr></thead>
        <tbody>{list.map((p,i)=><tr key={p.id} style={{ borderBottom: i<list.length-1?'1px solid #DDD9D0':'none' }}>
          <td style={{ padding:'12px 16px', fontSize:13, fontWeight:600 }}>{p.destinatarios||'Sin cliente'}</td>
          <td style={{ padding:'12px 16px', fontSize:12.5, color:'#7A756C' }}>{p.fecha}</td>
          <td style={{ padding:'12px 16px', fontSize:13, fontWeight:600, color:'#2B4C3F' }}>{p.total?fPeso(p.total):'—'}</td>
          <td style={{ padding:'12px 16px' }}>
            <div style={{ display:'flex', gap:6 }}>
              {[['✏️','Editar',()=>onLoad(p)],['📥','PDF',()=>downloadPDF(p)],['🗑','Eliminar',()=>del(p.id)]].map(([ic,tt,fn])=>(
                <button key={tt} title={tt} onClick={fn} style={{ width:28,height:28,border:'1px solid #DDD9D0',background:'#fff',borderRadius:5,cursor:'pointer',fontSize:13 }}>{ic}</button>
              ))}
            </div>
          </td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>;
}

// ── CONFIG ─────────────────────────────────────────────────────────────────────
function ConfigView() {
  const init = getCfg();
  const [nombre, setNombre] = useState(init.nombre||'');
  const [sub, setSub] = useState(init.sub||'');
  const [cel, setCel] = useState(init.cel||'');
  const [cuit, setCuit] = useState(init.cuit||'');
  const [dom, setDom] = useState(init.dom||'');
  const [logo, setLogo] = useState(init.logo||null);
  const [saved, setSaved] = useState(false);

  const handleLogo = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => setLogo(ev.target.result);
    r.readAsDataURL(f);
  };

  const save = () => {
    localStorage.setItem('cfg', JSON.stringify({ nombre, sub, cel, cuit, dom, logo }));
    setSaved(true); setTimeout(()=>setSaved(false), 2500);
  };

  return <div style={{ padding:24, maxWidth:540 }}>
    <div style={{ fontSize:22, fontWeight:700, marginBottom:6 }}>Mis datos</div>
    <div style={{ fontSize:12.5, color:'#7A756C', marginBottom:22 }}>Aparecen en el encabezado de todos los presupuestos.</div>
    <div style={{ background:'#fff', border:'1px solid #DDD9D0', borderRadius:12, padding:'18px 20px', display:'flex', flexDirection:'column', gap:14 }}>
      <Field label="Nombre / Razón social"><Input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="José Antonio Tapia" /></Field>
      <Field label="Subtítulo / Rubro"><Input value={sub} onChange={e=>setSub(e.target.value)} placeholder="Servicios Integrales de Construcción y Mantenimiento" /></Field>
      <div style={{ display:'flex', gap:13 }}>
        <Field label="Celular"><Input value={cel} onChange={e=>setCel(e.target.value)} placeholder="03543-15601317" /></Field>
        <Field label="CUIT"><Input value={cuit} onChange={e=>setCuit(e.target.value)} placeholder="20-30499016-4" /></Field>
      </div>
      <Field label="Domicilio"><Input value={dom} onChange={e=>setDom(e.target.value)} placeholder="Armenia 2374" /></Field>
      <Field label="Logo">
        <div style={{ border:'2px dashed #DDD9D0', borderRadius:8, padding:14, textAlign:'center', cursor:'pointer' }} onClick={()=>document.getElementById('logo-inp').click()}>
          <input id="logo-inp" type="file" accept="image/*" style={{ display:'none' }} onChange={handleLogo} />
          {logo ? <img src={logo} style={{ maxHeight:52, maxWidth:140, objectFit:'contain' }} /> : <span style={{ fontSize:12.5, color:'#7A756C' }}>📁 Subí tu logo (PNG, JPG)</span>}
        </div>
      </Field>
      <button onClick={save} style={{ padding:'9px 18px', background:'#2B4C3F', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', alignSelf:'flex-start', fontFamily:'inherit' }}>Guardar datos</button>
      {saved && <div style={{ padding:'9px 12px', background:'#E8F0ED', color:'#2B4C3F', borderRadius:8, fontSize:13, fontWeight:500 }}>✅ Datos guardados</div>}
    </div>
  </div>;
}

// ── ROOT ───────────────────────────────────────────────────────────────────────
export default function App() {
  const [view, setView] = useState('form');
  const [loadData, setLoadData] = useState(null);
  const [tick, setTick] = useState(0);

  const goForm = (data=null) => { setLoadData(data); setView('form'); };
  const onSaved = () => setTick(t=>t+1);

  const navBtn = (v, icon, label) => (
    <button onClick={()=>setView(v)} style={{ display:'flex', alignItems:'center', gap:9, padding:'9px 11px', borderRadius:8, cursor:'pointer', fontSize:13, fontWeight:500, border:'none', width:'100%', textAlign:'left', fontFamily:'inherit', background: view===v?'rgba(255,255,255,.15)':'transparent', color: view===v?'#fff':'rgba(255,255,255,.62)' }}>
      {icon} {label}
    </button>
  );

  const recents = getAll().slice(0,6);

  return (
    <div style={{ display:'flex', height:'100vh', fontFamily:"'Inter',sans-serif", overflow:'hidden', maxWidth:'100%' }}>
      {/* SIDEBAR */}
      <aside style={{ width:240, minWidth:240, flexShrink:0, background:'#2B4C3F', display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <div style={{ padding:'20px 16px 14px', borderBottom:'1px solid rgba(255,255,255,.1)' }}>
          <div style={{ fontSize:17, fontWeight:700, color:'#fff', marginBottom:3 }}>Presupuestos</div>
          <div style={{ fontSize:10, color:'rgba(255,255,255,.4)', textTransform:'uppercase', letterSpacing:.8 }}>Servicios de construcción</div>
        </div>
        <div style={{ padding:'10px 8px', display:'flex', flexDirection:'column', gap:3 }}>
          {navBtn('form','✏️','Nuevo presupuesto')}
          {navBtn('history','📋','Historial')}
          {navBtn('config','⚙️','Mis datos')}
        </div>
        <div style={{ padding:'12px 11px 4px', fontSize:10, fontWeight:600, textTransform:'uppercase', letterSpacing:1, color:'rgba(255,255,255,.28)' }}>Recientes</div>
        <div style={{ flex:1, overflowY:'auto', padding:'0 8px 10px' }}>
          {recents.length === 0 && <div style={{ fontSize:11.5, color:'rgba(255,255,255,.28)', padding:12, textAlign:'center', lineHeight:1.6 }}>Los presupuestos guardados aparecen acá.</div>}
          {recents.map(p=>(
            <div key={p.id} onClick={()=>goForm(p)} style={{ padding:'8px 11px', borderRadius:8, cursor:'pointer', marginBottom:2 }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{ fontSize:12, fontWeight:500, color:'rgba(255,255,255,.82)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.destinatarios||'Sin cliente'}</div>
              <div style={{ fontSize:10, color:'rgba(255,255,255,.36)', marginTop:2, display:'flex', justifyContent:'space-between' }}>
                <span>{p.fecha}</span><span>{p.total?fPeso(p.total):'—'}</span>
              </div>
            </div>
          ))}
        </div>
        <button onClick={()=>goForm(null)} style={{ margin:'0 8px 12px', padding:10, background:'#C8873A', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>+ Nuevo presupuesto</button>
      </aside>

      {/* MAIN */}
      <main style={{ flex:1, minWidth:0, overflow:'hidden', display:'flex', flexDirection:'column', background:'#F7F6F3' }}>
        {view==='form' && <FormView key={tick + (loadData?.id||'new')} loadData={loadData} onSaved={onSaved} />}
        {view==='history' && <HistoryView key={tick} onLoad={p=>goForm(p)} />}
        {view==='config' && <ConfigView />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
